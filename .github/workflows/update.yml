name: Atualizar sorteios

on:
  schedule:
    # Sorteios à terça e sexta ~20:00 (Lisboa). Corre pouco depois, em UTC,
    # com uma segunda tentativa na manhã seguinte caso a fonte demore.
    - cron: "0 22 * * 2,5"
    - cron: "0 8 * * 3,6"
  workflow_dispatch: {}   # permite correr manualmente no separador Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Atualizar draws.json
        run: python scripts/update.py

      - name: Atualizar M1lhão
        run: python scripts/milhao.py

      - name: Commit se houver novidades
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/draws.json data/milhao.json
            git commit -m "Atualizar sorteios e M1lhão ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "Sem alteracoes."
          fi
